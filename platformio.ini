[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; USB-serial port intentionally NOT pinned. Multiple shack ESP boards
; ship with Silicon Labs CP2102 chips whose factory-locked default
; serial number is "0001" — a pinned upload_port would silently flash
; the wrong board whenever two are connected. Use the interactive
; wrappers instead:
;     ./flash.sh        # build + upload, prompts when >1 port present
;     ./monitor.sh      # serial monitor, same prompt
; See HANDOVER.md for the investigation done in the sibling
; esp8266-gps-ntp project on 2026-05-12 (CP2102 EEPROM is factory-
; locked, software reprogramming silently no-ops).

build_flags =
    -DFIRMWARE_VERSION='"v0.2.0"'
    -DCORE_DEBUG_LEVEL=3
    -DMQTT_MAX_PACKET_SIZE=512

lib_deps =
    knolleary/PubSubClient @ ^2.8
    https://github.com/tzapu/WiFiManager.git#v2.0.17
    bblanchon/ArduinoJson @ ^7.0.0
    ; AS3935 driver is intentionally NOT a library — direct I²C in
    ; main.cpp mirrors as3935_mqtt.py byte-for-byte and is short
    ; enough that a library wrapper would only obscure the contract.

monitor_filters = esp32_exception_decoder, time
