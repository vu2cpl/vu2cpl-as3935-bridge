[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DFIRMWARE_VERSION='"v0.1.0"'
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    knolleary/PubSubClient @ ^2.8
    ; AS3935 library — pick the maintained variant for your I2C module.
    ; Common choices:
    ;   sandeepmistry/Arduino-AS3935
    ;   ripred/AS3935MI
    ;   joshuabarrass/AS3935-Arduino
    ; Pin a specific version once chosen.

monitor_filters = esp32_exception_decoder, time
