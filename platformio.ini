[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Pinned so pio never picks an FTDI radio CAT cable by accident.
; If the ESP32 enumerates as something else on a different Mac, override
; with `pio run -t upload --upload-port /dev/cu.XXX`.
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001

build_flags =
    -DFIRMWARE_VERSION='"v0.2.0"'
    -DCORE_DEBUG_LEVEL=3
    -DMQTT_MAX_PACKET_SIZE=512

lib_deps =
    knolleary/PubSubClient @ ^2.8
    https://github.com/tzapu/WiFiManager.git#v2.0.17
    bblanchon/ArduinoJson @ ^7.0.0
    ; AS3935 driver is intentionally NOT a library — direct I²C in
    ; main.cpp mirrors as3935_mqtt.py byte-for-byte and is short
    ; enough that a library wrapper would only obscure the contract.

monitor_filters = esp32_exception_decoder, time
